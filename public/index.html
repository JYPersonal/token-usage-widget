<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Token Usage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <script src="/fmt.js"></script>
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
  </div>

  <header class="site-header">
    <div class="brand">
      <span class="brand-mark"></span>
      <div class="brand-text">
        <h1>Token Usage</h1>
        <p class="tagline">Multi-harness usage: Codex, OpenCode, Cursor, Claude, OpenRouter, Kimi, Z.AI, Grok</p>
      </div>
    </div>
    <div class="header-meta">
      <span id="fixture-badge" class="badge badge--ghost" hidden>FIXTURE</span>
      <span id="refresh-clock" class="refresh-clock">--:--:--</span>
      <span class="refresh-pulse" title="Auto-refresh every 60s"></span>
    </div>
  </header>

  <main class="providers" id="providers">
    <!-- provider columns injected by app.js -->
  </main>

  <footer class="site-footer">
    <span id="footer-status">Connecting…</span>
    <span class="footer-hint">Auto-refresh 60s</span>
  </footer>

  <template id="provider-template">
    <section class="provider">
      <header class="provider-head">
        <h2 class="provider-title"></h2>
        <span class="provider-sub"></span>
      </header>
      <div class="windows"></div>
      <p class="provider-error" hidden></p>
    </section>
  </template>

  <template id="window-template">
    <article class="window">
      <header class="window-head">
        <span class="window-label"></span>
        <span class="window-reset"></span>
      </header>
      <div class="meter">
        <div class="meter-fill"></div>
        <div class="meter-ticks" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
      <dl class="window-stats">
        <div class="stat">
          <dt>Used</dt>
          <dd class="stat-used"></dd>
        </div>
        <div class="stat">
          <dt>Remaining</dt>
          <dd class="stat-remaining"></dd>
        </div>
        <div class="stat stat--tokens">
          <dt>Tokens</dt>
          <dd class="stat-tokens"></dd>
        </div>
      </dl>
    </article>
  </template>

  <template id="balance-template">
    <div class="balance-block">
      <p class="balance-label"></p>
      <p class="balance-value">
        <span class="balance-remaining"></span>
        <span class="balance-unit"></span>
      </p>
      <p class="balance-reset"></p>
    </div>
  </template>

  <template id="cursor-bill-template">
    <div class="cursor-bill" data-expanded="true">
      <p class="bill-plan"></p>
      <div class="bill-total">
        <div class="bill-row">
          <span class="bill-row-label">Total</span>
          <span class="bill-total-pct"></span>
        </div>
        <div class="bill-meter">
          <div class="bill-meter-fill"></div>
        </div>
      </div>
      <button type="button" class="bill-summary" aria-expanded="true">
        <span class="bill-summary-text"></span>
        <span class="bill-chevron" aria-hidden="true"></span>
      </button>
      <div class="bill-details">
        <div class="bill-bucket bill-auto">
          <div class="bill-row">
            <span class="bill-row-label">First-party models</span>
            <span class="bill-auto-pct"></span>
          </div>
          <div class="bill-meter bill-meter--thin">
            <div class="bill-meter-fill"></div>
          </div>
          <p class="bill-note bill-auto-note"></p>
        </div>
        <div class="bill-bucket bill-api">
          <div class="bill-row">
            <span class="bill-row-label">API</span>
            <span class="bill-api-pct"></span>
          </div>
          <div class="bill-meter bill-meter--thin">
            <div class="bill-meter-fill"></div>
          </div>
          <p class="bill-note bill-api-note"></p>
        </div>
      </div>
      <p class="bill-remaining"></p>
      <p class="bill-reset"></p>
      <p class="bill-error" hidden></p>
    </div>
  </template>

  <script src="/app.js"></script>
</body>
</html>
